<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-7-M 유학박람회 응답 현황</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #f0f4f8; color: #333; }
    header {
      background: #1a73e8; color: white;
      padding: 24px; text-align: center;
    }
    header h1 { font-size: 22px; margin-bottom: 6px; }
    header p { font-size: 14px; opacity: 0.85; }
    #total-badge {
      display: inline-block; background: white; color: #1a73e8;
      font-weight: bold; font-size: 16px;
      padding: 6px 20px; border-radius: 20px; margin-top: 10px;
    }
    #last-updated { font-size: 12px; opacity: 0.7; margin-top: 6px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
      gap: 24px; padding: 24px; max-width: 1200px; margin: 0 auto;
    }
    .card {
      background: white; border-radius: 12px;
      padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card h2 { font-size: 14px; color: #1a73e8; margin-bottom: 16px; font-weight: 600; }
    .chart-wrap { position: relative; height: 280px; }
    #loading { text-align: center; padding: 60px; font-size: 16px; color: #888; }
  </style>
</head>
<body>

<header>
  <h1>📊 E-7-M 유학박람회 응답 현황</h1>
  <p>서정대학교 글로벌섬유패션비즈니스과</p>
  <div id="total-badge">총 응답자: 집계 중...</div>
  <div id="last-updated"></div>
</header>

<div id="loading">📡 데이터 불러오는 중...</div>
<div class="grid" id="chart-grid" style="display:none"></div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzf0Jwdx9kJX6Ef05Golz1YbuZ_bT7ZjbczNyLR7G4yvlUpkYXWlyOT5OG7g9XaXAbc/exec";

  const COLORS = [
    "#4285F4","#EA4335","#FBBC04","#34A853",
    "#FF6D00","#AB47BC","#00ACC1","#43A047",
    "#F4511E","#039BE5","#7CB342","#E91E63"
  ];

  async function loadData() {
    try {
      const res = await fetch(API_URL);
      const json = await res.json();

      document.getElementById("total-badge").textContent = `총 응답자: ${json.total}명`;
      document.getElementById("last-updated").textContent =
        `마지막 업데이트: ${new Date().toLocaleString("ko-KR")}`;

      const grid = document.getElementById("chart-grid");
      grid.innerHTML = "";

      json.charts.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        const title = document.createElement("h2");
        title.textContent = item.question;
        card.appendChild(title);

        const wrap = document.createElement("div");
        wrap.className = "chart-wrap";
        const canvas = document.createElement("canvas");
        wrap.appendChild(canvas);
        card.appendChild(wrap);
        grid.appendChild(card);

        new Chart(canvas, {
          type: "doughnut",
          data: {
            labels: item.labels.map((l, i) => `${l} (${item.data[i]}명)`),
            datasets: [{
              data: item.data,
              backgroundColor: COLORS.slice(0, item.labels.length),
              borderWidth: 2
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: "right", labels: { font: { size: 11 }, padding: 12 } },
              tooltip: {
                callbacks: {
                  label: ctx => {
                    const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                    const pct = total ? ((ctx.parsed / total) * 100).toFixed(1) : 0;
                    return ` ${ctx.label}: ${pct}%`;
                  }
                }
              }
            }
          }
        });
      });

      document.getElementById("loading").style.display = "none";
      grid.style.display = "grid";

    } catch (err) {
      document.getElementById("loading").textContent = "❌ 데이터 로딩 실패. API URL을 확인해주세요.";
    }
  }

  loadData();
  // 5분마다 자동 새로고침
  setInterval(loadData, 5 * 60 * 1000);
</script>

</body>
</html>
